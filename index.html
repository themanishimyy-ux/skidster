<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicoownsthis This</title>
    <style>
        body {
            font-family: 'Super Mindset', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            color: #333;
            /* Hide default cursor so the image cursor takes over */
            cursor: none;
        }

        /* Custom Image Cursor */
        .custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 80px; /* Adjust size here if you want it smaller or bigger */
            height: 80px;
            pointer-events: none; /* Allows clicking through the image */
            z-index: 9999;
            transform: translate(-50%, -50%);
            
            /* Your custom pink/white cursor */
            background-image: url('https://www.dropbox.com/scl/fi/ysw6i06ds5hubpwyt9mwf/d77006bc6390c00cdb3c82f8641e4452.png?rlkey=rdh8ba7pupsol4qih63qcchl6&st=86ije9zd&raw=1');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* Snowfall Canvas container */
        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass right through to buttons/content */
            z-index: 2; /* Sits above background, behind overlay and content */
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 1s ease;
            cursor: none; 
        }

        .click-text {
            font-size: 3rem;
            color: white;
            text-align: center;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
            cursor: none;
        }

        /* Absolutely centered semi-transparent white box */
        .content {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            z-index: 3; /* Elevated above the snow canvas */
            text-align: center;
            padding: 40px;
            
            /* 60% opaque white background */
            background: rgba(255, 255, 255, 0.6); 
            /* Frosted glass blur effect */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            /* Subtle bright border to make the glass edge pop */
            border: 1px solid rgba(255, 255, 255, 0.4); 
            
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
            
            /* Start invisible and shrunk */
            opacity: 0;
            /* Smooth transitions for scale and opacity */
            transition: opacity 1s cubic-bezier(0.34, 1.56, 0.64, 1), transform 1s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Keeps perfect centering while scaling up on enter */
        .content.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            color: #e91e63;
            line-height: 1.2;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="custom-cursor" class="custom-cursor"></div>

    <canvas id="snow-canvas"></canvas>

    <div id="overlay" class="overlay">
        <div class="click-text">CLICK ANYWHERE TO ENTER</div>
    </div>

    <div id="content" class="content">
        <h1>Eibd owns this website and is a larp</h1>
    </div>

    <audio id="bgmusic" loop preload="auto">
        <source src="https://www.dropbox.com/scl/fi/y66dxtu8y6snyr0d8m4p0/SpotiDown.App-Blue-Bands-Weiland.mp3?rlkey=4u8sava6vm31v60rmg85tvvuo&st=ks0dp4ew&dl=1" type="audio/mpeg">
    </audio>

    <script>
        const overlay = document.getElementById('overlay');
        const content = document.getElementById('content');
        const audio = document.getElementById('bgmusic');
        const cursor = document.getElementById('custom-cursor');
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');

        // Track mouse movement for custom cursor
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // --- SNOWFALL EFFECT LOGIC ---
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const maxSnowflakes = 100; // Total flakes on screen
        const snowflakes = [];

        // Generate random parameters for each flake
        for (let i = 0; i < maxSnowflakes; i++) {
            snowflakes.push({
                x: Math.random() * width,
                y: Math.random() * height,
                r: Math.random() * 3 + 1, // Flake size (1px to 4px)
                d: Math.random() * maxSnowflakes, // Density/sway pattern
                speed: Math.random() * 1.5 + 0.5 // Drifting speed
            });
        }

        // Keep canvas matched to window resize
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        function drawSnow() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.beginPath();
            
            for (let i = 0; i < maxSnowflakes; i++) {
                const f = snowflakes[i];
                ctx.moveTo(f.x, f.y);
                ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2, true);

                // Update falling/swaying position
                f.y += f.speed;
                f.x += Math.sin(f.d) * 0.5;

                // If a snowflake hits the bottom, reset it back to the top
                if (f.y > height) {
                    snowflakes[i] = {
                        x: Math.random() * width,
                        y: -10,
                        r: f.r,
                        d: f.d,
                        speed: f.speed
                    };
                }
            }
            ctx.fill();
            requestAnimationFrame(drawSnow);
        }

        // Initialize Snowfall Loop
        drawSnow();

        // --- ENTER EXPERIENCE LOGIC ---
        function startExperience() {
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.classList.add('hidden');
                // Adds the scale-up and fade-in effect to the content
                content.classList.add('show');
            }, 800);

            audio.volume = 0.7;
            audio.play().catch(() => {});
        }

        document.addEventListener('click', startExperience, { once: true });
        document.addEventListener('touchstart', startExperience, { once: true });
    </script>
</body>
</html>
