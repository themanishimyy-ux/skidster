<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicoownsthis This</title>
    <style>
        body {
            font-family: 'Super Mindset', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            color: #333;
            /* Hide default cursor so the image cursor takes over */
            cursor: none;
        }

        /* Custom Image Cursor */
        .custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 80px; /* Adjust size here if you want it smaller or bigger */
            height: 80px;
            pointer-events: none; /* Allows clicking through the image */
            z-index: 9999;
            transform: translate(-50%, -50%);
            background-image: url('https://www.dropbox.com/scl/fi/itexe5297kps4duqx23ft/Eye-Glow-Png-Circle-Transparent-Png-800x798-PngFind.jpg?rlkey=b92ope8bxmrbhuw58ywbbee7r&st=00xv3b7f&raw=1');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            
            /* Blends out the dark checkerboard background, leaving only the white glow */
            mix-blend-mode: screen; 
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 1s ease;
        }

        .click-text {
            font-size: 3rem;
            color: white;
            text-align: center;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 0 auto;
            opacity: 0;
            transition: opacity 1.2s ease;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            color: #e91e63;
            line-height: 1.2;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="overlay" class="overlay">
        <div class="click-text">CLICK ANYWHERE TO ENTER</div>
    </div>
