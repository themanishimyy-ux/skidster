<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicoownsthis This</title>
    <style>
        body {
            font-family: 'Super Mindset', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            color: #333;
            /* Hide default cursor so the image cursor takes over */
            cursor: none;
        }

        /* Custom Image Cursor */
        .custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 80px; /* Adjust size here if you want it smaller or bigger */
            height: 80px;
            pointer-events: none; /* Allows clicking through the image */
            z-index: 9999;
            transform: translate(-50%, -50%);
            
            /* Your custom pink/white cursor */
            background-image: url('https://www.dropbox.com/scl/fi/ysw6i06ds5hubpwyt9mwf/d77006bc6390c00cdb3c82f8641e4452.png?rlkey=rdh8ba7pupsol4qih63qcchl6&st=86ije9zd&raw=1');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* High-Quality Background Image Layer */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Your newly updated background image */
            background-image: url('https://www.dropbox.com/scl/fi/dqg2xii9mecqvxpas3yit/wp13485676.jpg?rlkey=8t70vltwii09ro2ih0p4la89i&st=tp4szl7a&raw=1');
            background-size: cover;
            background-position: center;
            z-index: 1; /* Sits behind rain and text */
            opacity: 0;
            transition: opacity 1.5s ease; /* Smooth 1.5s fade-in */
        }

        .bg-image.show {
            opacity: 1;
        }

        /* Rain Canvas container */
        #rain-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass right through to buttons/content */
            z-index: 2; /* Sits above background, behind overlay and content */
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 1s ease;
            cursor: none; 
        }

        .click-text {
            font-size: 3rem;
            color: white;
            text-align: center;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
            cursor: none;
        }

        /* Absolutely centered translucent, clear glass box */
        .content {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            z-index: 3; /* Elevated above the rain canvas */
            text-align: center;
            padding: 40px;
            
            /* Lower opacity (45% white) to make it much more see-through */
            background: rgba(255, 255, 255, 0.45); 
            /* Lighter blur (12px) so background elements behind it look clearer */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            /* Slightly stronger frosty white border highlight */
            border: 1.5px solid rgba(255, 255, 255, 0.6); 
            
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
            max-width: 500px;
            width: 90%;
            
            /* Start invisible and shrunk */
            opacity: 0;
            /* Smooth transitions for scale and opacity */
            transition: opacity 1s cubic-bezier(0.34, 1.56, 0.64, 1), transform 1s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Keeps perfect centering while scaling up on enter */
        .content.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            color: #e91e63;
            line-height: 1.2;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.4);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="custom-cursor" class="custom-cursor"></div>

    <!-- Background Image Layer -->
    <div id="bg-image" class="bg-image"></div>

    <!-- Rain Canvas Element (Renamed ID from snow-canvas) -->
    <canvas id="rain-canvas"></canvas>

    <div id="overlay" class="overlay">
        <div class="click-text">CLICK ANYWHERE TO ENTER</div>
    </div>

    <div id="content" class="content">
        <h1>Eibd owns this website and is a larp</h1>
    </div>

    <audio id="bgmusic" loop preload="auto">
        <source src="https://www.dropbox.com/scl/fi/y66dxtu8y6snyr0d8m4p0/SpotiDown.App-Blue-Bands-Weiland.mp3?rlkey=4u8sava6vm31v60rmg85tvvuo&st=ks0dp4ew&dl=1" type="audio/mpeg">
    </audio>

    <script>
        const overlay = document.getElementById('overlay');
        const content = document.getElementById('content');
        const bgImage = document.getElementById('bg-image');
        const audio = document.getElementById('bgmusic');
        const cursor = document.getElementById('custom-cursor');
        const canvas = document.getElementById('rain-canvas');
        
        // Setup custom cursor movement safely
        if (cursor) {
            document.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });
        }

        // --- RAINFALL EFFECT LOGIC ---
        if (canvas) {
            const ctx = canvas.getContext('2d');
            let width = canvas.width = window.innerWidth;
            let height = canvas.height = window.innerHeight;

            const maxRaindrops = 140; // Amount of rain on screen
            const raindrops = [];

            // Generate initial parameters for each raindrop
            for (let i = 0; i < maxRaindrops; i++) {
                raindrops.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    length: Math.random() * 20 + 10, // Length of the drop line
                    speed: Math.random() * 12 + 12,  // Faster downward velocity
                    opacity: Math.random() * 0.2 + 0.15 // Soft transparency variants
                });
            }

            // Keep canvas matched to window resize
            window.addEventListener('resize', () => {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            });

            function drawRain() {
                ctx.clearRect(0, 0, width, height);
                
                // Adjust drop width and line cap properties for a smooth stretch
                ctx.lineWidth = 1.5;
                ctx.lineCap = 'round';
                
                for (let i = 0; i < maxRaindrops; i++) {
                    const r = raindrops[i];
                    
                    // Soft dark translucent color for visibility against white backgrounds
                    ctx.strokeStyle = `rgba(0, 0, 0, ${r.opacity})`;
                    ctx.beginPath();
                    
                    // Draw raindrop with a tiny horizontal offset (slight slant/angle)
                    ctx.moveTo(r.x, r.y);
                    ctx.lineTo(r.x + 1, r.y + r.length);
                    ctx.stroke();

                    // Update raindrop position based on speed
                    r.y += r.speed;
                    r.x += 0.5; // Controls uniform light breeze slant

                    // If a raindrop falls past the bottom, reset it back to the top
                    if (r.y > height) {
                        raindrops[i] = {
                            x: Math.random() * width,
                            y: -20,
                            length: r.length,
                            speed: r.speed,
                            opacity: r.opacity
                        };
                    }
                }
                requestAnimationFrame(drawRain);
            }

            // Initialize Rain Loop
            drawRain();
        }

        // --- ENTER EXPERIENCE LOGIC ---
        function startExperience() {
            if (overlay) overlay.style.opacity = '0';
            
            // Safety check: only transition background if the HTML element exists
            if (bgImage) bgImage.classList.add('show');

            setTimeout(() => {
                if (overlay) overlay.classList.add('hidden');
                // Safety check: only show content if the element exists
                if (content) content.classList.add('show');
            }, 800);

            if (audio) {
                audio.volume = 0.7;
                audio.play().catch(() => {});
            }
        }

        // Listen for clicks or touches anywhere to enter
        document.addEventListener('click', startExperience, { once: true });
        document.addEventListener('touchstart', startExperience, { once: true });
    </script>
</body>
</html>
