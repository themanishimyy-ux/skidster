<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nico Made This</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            position: relative;
        }

        .image-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: 160px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .image-container:hover {
            transform: scale(1.05);
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        h1 {
            font-size: 3.5rem;
            margin: 0;
            color: #e91e63;
        }
        .heart {
            font-size: 4rem;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        p {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #666;
        }

        .click-btn {
            margin: 20px auto;
            padding: 12px 28px;
            font-size: 1.1rem;
            background: #e91e63;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(233, 30, 99, 0.3);
        }

        .click-btn:hover {
            background: #c2185b;
            transform: scale(1.05);
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="font-family: Arial, sans-serif;">Eibd owns this website and is a larp</h1>
        
        <button onclick="showMessage()" class="click-btn">Click me <3</button>
        
        <div id="message" class="hidden">
            <p>with love &lt;3</p>
            
            <!-- Femboy photo -->
            <div class="image-container" style="position: static; width: 280px; height: 380px; margin: 20px auto;">
                <img src="bestfemboy.webp" alt="Femboy" style="border-radius: 12px;">
            </div>
        </div>
    </div>

    <script>
        function showMessage() {
            document.getElementById('message').classList.remove('hidden');
            document.querySelector('.click-btn').style.display = 'none';
        }
    </script>
</body>
</html>
