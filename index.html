<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nico Made This</title>
    <style>
        body {
            font-family: 'Super Mindset', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        h1 {
            font-size: 2.5rem;
            margin: 0;
            color: #e91e63;
            line-height: 1.2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Eibd owns this website and is a larp</h1>
    </div>

    <!-- Background Audio - Fixed -->
    <audio id="bgmusic" autoplay loop preload="auto">
        <source src="https://www.dropbox.com/scl/fi/y66dxtu8y6snyr0d8m4p0/SpotiDown.App-Blue-Bands-Weiland.mp3?rlkey=4u8sava6vm31v60rmg85tvvuo&st=ks0dp4ew&dl=1" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script>
        // Fix for autoplay restrictions
        const audio = document.getElementById('bgmusic');
        
        audio.volume = 0.7; // Set volume (0.0 - 1.0)

        // Try to play if it was blocked
        window.addEventListener('click', () => {
            if (audio.paused) audio.play();
        }, { once: true });
    </script>
</body>
</html>
